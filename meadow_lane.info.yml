name: Meadow Lane Park
type: theme
description: 'Custom theme for Meadow Lane Park, a resident-owned community in the 1000 Islands region of New York State.'
package: Custom
core_version_requirement: ^10 || ^11
base theme: false

# Auto-attach these libraries on every page.
libraries:
  - meadow_lane/global-styling
  - meadow_lane/navigation

# Regions
regions:
  header_top: 'Header Top'
  header: 'Header'
  primary_menu: 'Primary Menu'
  hero: 'Hero'
  highlighted: 'Highlighted'
  breadcrumb: 'Breadcrumb'
  content_top: 'Content Top'
  content: 'Content'
  content_bottom: 'Content Bottom'
  sidebar_first: 'Sidebar First'
  sidebar_second: 'Sidebar Second'
  footer_first: 'Footer First'
  footer_second: 'Footer Second'
  footer_third: 'Footer Third'
  footer_fourth: 'Footer Fourth'
  footer_bottom: 'Footer Bottom'

# Feature flags
features:
  - logo
  - favicon

# Default logo and favicon — overridable via Appearance > Settings
logo:
  path: images/logo-full.png
  use_default: false

favicon:
  path: images/favicon.png
  use_default: false
